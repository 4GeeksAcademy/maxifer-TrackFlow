<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulario de contacto TrackFlow para marcas e-commerce que necesitan revisar su operación logística, última milla o devoluciones."
    />
    <title>Hablemos de tu operación | TrackFlow</title>
    <link rel="canonical" href="application.html" />
    <link rel="icon" href="assets/trackflow-logo.svg" type="image/svg+xml" />
    <meta name="robots" content="index,follow" />
    <meta name="geo.region" content="US-CA; ES-AR" />
    <meta name="geo.placename" content="Los Ángeles; Zaragoza" />
    <meta name="keywords" content="contacto logística e-commerce, TrackFlow, última milla, fulfillment, devoluciones, transportistas" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrackFlow" />
    <meta property="og:title" content="Hablemos de tu operación | TrackFlow" />
    <meta property="og:description" content="Completa el formulario y el equipo de TrackFlow revisará tu contexto operativo antes de coordinar una conversación." />
    <meta property="og:image" content="assets/trackflow-hero.png" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hablemos de tu operación | TrackFlow" />
    <meta name="twitter:description" content="Completa el formulario y el equipo de TrackFlow revisará tu contexto operativo antes de coordinar una conversación." />
    <meta name="twitter:image" content="assets/trackflow-hero.png" />
    <script>
      const root = document.documentElement;

      root.style.setProperty("--tf-bg", "#0f172a");
      root.style.setProperty("--tf-surface", "#111827");
      root.style.setProperty("--tf-border", "#1e293b");
      root.style.setProperty("--tf-text", "#f8fafc");
      root.style.setProperty("--tf-text-muted", "#cbd5e1");
      root.style.setProperty("--tf-text-soft", "#94a3b8");
      root.style.setProperty("--tf-brand", "#10b981");
      root.style.setProperty("--tf-brand-hover", "#34d399");
      root.style.setProperty("--tf-accent", "#f59e0b");
      root.style.setProperty("--tf-error", "#fb7185");
      root.style.setProperty("--tf-border-soft", "#334155");
      root.style.setProperty("--tf-bg-rgb", "15 23 42");
      root.style.setProperty("--tf-text-rgb", "248 250 252");
      root.style.setProperty("--tf-brand-rgb", "16 185 129");
      root.style.setProperty("--tf-error-rgb", "251 113 133");
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "index.html#organization",
            "name": "TrackFlow",
            "url": "index.html",
            "logo": "assets/trackflow-logo.svg",
            "foundingDate": "2009",
            "description": "Empresa de logística de última milla y gestión de almacenes para marcas e-commerce con operaciones en Estados Unidos y España.",
            "areaServed": [
              {
                "@type": "Country",
                "name": "United States"
              },
              {
                "@type": "Country",
                "name": "Spain"
              }
            ],
            "location": [
              {
                "@type": "Place",
                "name": "Los Ángeles",
                "address": {
                  "@type": "PostalAddress",
                  "addressLocality": "Los Ángeles",
                  "addressRegion": "CA",
                  "addressCountry": "US"
                }
              },
              {
                "@type": "Place",
                "name": "Zaragoza",
                "address": {
                  "@type": "PostalAddress",
                  "addressLocality": "Zaragoza",
                  "addressCountry": "ES"
                }
              }
            ]
          },
          {
            "@type": "WebSite",
            "@id": "index.html#website",
            "name": "TrackFlow",
            "url": "index.html",
            "inLanguage": "es",
            "publisher": {
              "@id": "index.html#organization"
            }
          },
          {
            "@type": "WebPage",
            "@id": "application.html#webpage",
            "url": "application.html",
            "name": "Hablemos de tu operación | TrackFlow",
            "description": "Formulario de contacto TrackFlow para marcas e-commerce que necesitan revisar su operación logística, última milla o devoluciones.",
            "isPartOf": {
              "@id": "index.html#website"
            },
            "about": {
              "@id": "index.html#organization"
            },
            "inLanguage": "es",
            "potentialAction": {
              "@type": "CommunicateAction",
              "name": "Enviar consulta operativa",
              "target": "application.html#applicationForm"
            }
          },
          {
            "@type": "BreadcrumbList",
            "@id": "application.html#breadcrumbs",
            "itemListElement": [
              {
                "@type": "ListItem",
                "position": 1,
                "name": "Inicio",
                "item": "index.html"
              },
              {
                "@type": "ListItem",
                "position": 2,
                "name": "Hablemos de tu operación",
                "item": "application.html"
              }
            ]
          }
        ]
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="validation.js?v=2"></script>
  </head>
  <body class="bg-[var(--tf-bg)] text-[var(--tf-text)] antialiased">
    <header class="fixed inset-x-0 top-0 z-40">
      <div class="border-b border-[color:rgb(var(--tf-text-rgb)/0.12)] bg-[color:rgb(var(--tf-bg-rgb)/0.96)] shadow-[0_10px_26px_-16px_rgb(var(--tf-bg-rgb)/0.95)] backdrop-blur-md">
        <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8" aria-label="Navegación principal">
          <a href="index.html" class="flex items-center gap-3" aria-label="Volver a TrackFlow">
            <img src="assets/trackflow-logo.svg" alt="Logo de TrackFlow" class="h-10 w-10 rounded" />
            <span>
              <span class="block text-base font-semibold tracking-wide text-[var(--tf-text)]">TrackFlow</span>
              <span class="block text-xs text-[color:rgb(var(--tf-text-rgb)/0.78)]">Last-mile operations</span>
            </span>
          </a>
          <a class="text-sm font-medium text-[var(--tf-text-muted)] hover:text-white" href="index.html">Volver a la landing</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-5 pb-8 pt-28 lg:px-8">
      <section class="grid gap-8 lg:grid-cols-[0.8fr_1.2fr]">
        <aside class="lg:sticky lg:top-28 lg:self-start">
          <p class="text-sm font-bold uppercase tracking-[0.25em] text-[var(--tf-accent)]">Contacto TrackFlow</p>
          <h1 class="mt-3 text-4xl font-black leading-tight text-white sm:text-5xl">
            Cuéntanos cómo funciona hoy tu operación logística.
          </h1>
          <p class="mt-4 text-base leading-7 text-[var(--tf-text-muted)]">
            Completa el formulario y el equipo de TrackFlow revisará tu contexto operativo antes de coordinar una conversación.
          </p>
        </aside>

        <section class="rounded border border-[var(--tf-border)] bg-[var(--tf-surface)] p-5 shadow-2xl shadow-black/30 sm:p-6">
          <form id="applicationForm" novalidate class="space-y-5">
            <fieldset class="grid gap-4 sm:grid-cols-2">
              <legend class="mb-3 text-lg font-bold text-white">Empresa y contacto</legend>
              <div class="sm:col-span-2">
                <label for="companyName" class="block text-sm font-medium text-[var(--tf-text-muted)]">Nombre de la empresa *</label>
                <input id="companyName" name="companyName" type="text" required minlength="2" class="mt-1.5 w-full rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] px-4 py-2.5 text-white outline-none transition focus:border-[var(--tf-brand)]" />
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="companyName" aria-live="polite"></p>
              </div>
              <div>
                <label for="contactName" class="block text-sm font-medium text-[var(--tf-text-muted)]">Persona responsable *</label>
                <input id="contactName" name="contactName" type="text" required minlength="2" class="mt-1.5 w-full rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] px-4 py-2.5 text-white outline-none transition focus:border-[var(--tf-brand)]" />
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="contactName" aria-live="polite"></p>
              </div>
              <div>
                <label for="email" class="block text-sm font-medium text-[var(--tf-text-muted)]">Email *</label>
                <input id="email" name="email" type="email" required class="mt-1.5 w-full rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] px-4 py-2.5 text-white outline-none transition focus:border-[var(--tf-brand)]" />
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="email" aria-live="polite"></p>
              </div>
              <div>
                <label for="country" class="block text-sm font-medium text-[var(--tf-text-muted)]">País de operación principal *</label>
                <select id="country" name="country" required class="mt-1.5 w-full rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] px-4 py-2.5 text-white outline-none transition focus:border-[var(--tf-brand)]">
                  <option value="">Selecciona un país</option>
                  <option value="US">Estados Unidos</option>
                  <option value="ES">España</option>
                  <option value="OTHER">Otro</option>
                </select>
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="country" aria-live="polite"></p>
              </div>
              <div class="sm:col-span-2">
                <label for="notes" class="block text-sm font-medium text-[var(--tf-text-muted)]">¿Qué necesitas resolver? *</label>
                <textarea id="notes" name="notes" required minlength="10" rows="4" placeholder="Ej: necesitamos reducir incidencias en última milla, mejorar la gestión de devoluciones o centralizar el seguimiento de pedidos." class="mt-1.5 w-full rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] px-4 py-2.5 text-white outline-none transition focus:border-[var(--tf-brand)]"></textarea>
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="notes" aria-live="polite"></p>
              </div>
              <div class="rounded border border-[var(--tf-border)] bg-[var(--tf-bg)] p-3 sm:col-span-2">
                <label class="flex gap-3 text-sm text-[var(--tf-text-muted)]">
                  <input id="consent" name="consent" type="checkbox" required class="mt-1 h-4 w-4 rounded border-[var(--tf-border)] bg-[var(--tf-bg)] text-[var(--tf-brand)] focus:ring-[var(--tf-brand)]" />
                  <span>Acepto que TrackFlow use estos datos para responder mi consulta. *</span>
                </label>
                <p class="mt-1 min-h-4 text-xs text-[var(--tf-error)]" data-error-for="consent" aria-live="polite"></p>
              </div>
            </fieldset>

            <div id="formStatus" class="hidden rounded border p-4 text-sm" role="status" aria-live="polite"></div>

            <div class="flex flex-col gap-3 sm:flex-row">
              <button type="submit" class="rounded bg-[var(--tf-brand)] px-6 py-3 text-sm font-bold text-[var(--tf-bg)] transition hover:bg-[var(--tf-brand-hover)] focus:outline-none focus:ring-2 focus:ring-[var(--tf-brand)] focus:ring-offset-2 focus:ring-offset-[var(--tf-surface)]">
                Enviar consulta
              </button>
              <button type="reset" class="rounded border border-[var(--tf-border-soft)] bg-transparent px-6 py-3 text-sm font-bold text-[var(--tf-text-muted)] transition hover:border-[var(--tf-text-muted)] hover:text-white focus:outline-none focus:ring-2 focus:ring-[var(--tf-text-muted)] focus:ring-offset-2 focus:ring-offset-[var(--tf-surface)]">
                Limpiar formulario
              </button>
            </div>

          </form>
        </section>
      </section>
    </main>
  </body>
</html>
