<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulario de contacto TrackFlow para marcas e-commerce que necesitan apoyo en logística, almacenes, última milla o devoluciones."
    />
    <title>Hablemos de tu operación | TrackFlow</title>
    <link rel="canonical" href="application.html" />
    <link rel="icon" href="assets/trackflow-logo.svg" type="image/svg+xml" />
    <meta name="robots" content="index,follow" />
    <meta name="geo.region" content="US-CA; ES-AR" />
    <meta name="geo.placename" content="Los Ángeles; Zaragoza" />
    <meta name="keywords" content="contacto logística e-commerce, TrackFlow, última milla, fulfillment, devoluciones, transportistas" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrackFlow" />
    <meta property="og:title" content="Hablemos de tu operación | TrackFlow" />
    <meta property="og:description" content="Cuéntanos qué necesitas resolver en tu operación logística y el equipo de TrackFlow te contactará." />
    <meta property="og:image" content="assets/trackflow-hero.png" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hablemos de tu operación | TrackFlow" />
    <meta name="twitter:description" content="Cuéntanos qué necesitas resolver y coordinamos una primera conversación." />
    <meta name="twitter:image" content="assets/trackflow-hero.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "index.html#organization",
            "name": "TrackFlow",
            "url": "index.html",
            "logo": "assets/trackflow-logo.svg",
            "foundingDate": "2009",
            "description": "Empresa de logística de última milla y gestión de almacenes para marcas e-commerce con operaciones en Estados Unidos y España.",
            "areaServed": [
              {
                "@type": "Country",
                "name": "United States"
              },
              {
                "@type": "Country",
                "name": "Spain"
              }
            ],
            "location": [
              {
                "@type": "Place",
                "name": "Los Ángeles",
                "address": {
                  "@type": "PostalAddress",
                  "addressLocality": "Los Ángeles",
                  "addressRegion": "CA",
                  "addressCountry": "US"
                }
              },
              {
                "@type": "Place",
                "name": "Zaragoza",
                "address": {
                  "@type": "PostalAddress",
                  "addressLocality": "Zaragoza",
                  "addressCountry": "ES"
                }
              }
            ]
          },
          {
            "@type": "WebSite",
            "@id": "index.html#website",
            "name": "TrackFlow",
            "url": "index.html",
            "inLanguage": "es",
            "publisher": {
              "@id": "index.html#organization"
            }
          },
          {
            "@type": "WebPage",
            "@id": "application.html#webpage",
            "url": "application.html",
            "name": "Hablemos de tu operación | TrackFlow",
            "description": "Formulario de contacto TrackFlow para marcas e-commerce que necesitan apoyo en logística, almacenes, última milla o devoluciones.",
            "isPartOf": {
              "@id": "index.html#website"
            },
            "about": {
              "@id": "index.html#organization"
            },
            "inLanguage": "es",
            "potentialAction": {
              "@type": "CommunicateAction",
              "name": "Enviar consulta operativa",
              "target": "application.html#applicationForm"
            }
          },
          {
            "@type": "BreadcrumbList",
            "@id": "application.html#breadcrumbs",
            "itemListElement": [
              {
                "@type": "ListItem",
                "position": 1,
                "name": "Inicio",
                "item": "index.html"
              },
              {
                "@type": "ListItem",
                "position": 2,
                "name": "Hablemos de tu operación",
                "item": "application.html"
              }
            ]
          }
        ]
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="validation.js?v=2"></script>
  </head>
  <body class="bg-[#0F172A] text-[#F8FAFC] antialiased">
    <header class="border-b border-[#1E293B] bg-[#0F172A]">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4" aria-label="Navegación principal">
        <a href="index.html" class="flex items-center gap-3" aria-label="Volver a TrackFlow">
          <img src="assets/trackflow-logo.svg" alt="" class="h-10 w-10 rounded" aria-hidden="true" />
          <span class="font-semibold">TrackFlow</span>
        </a>
        <a class="text-sm font-medium text-[#CBD5E1] hover:text-white" href="index.html">Volver a la landing</a>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-5 py-8">
      <section class="grid gap-8 lg:grid-cols-[0.8fr_1.2fr]">
        <aside class="lg:sticky lg:top-8 lg:self-start">
          <p class="text-sm font-bold uppercase tracking-[0.25em] text-[#F59E0B]">Contacto TrackFlow</p>
          <h1 class="mt-3 text-4xl font-black leading-tight text-white sm:text-5xl">
            Hablemos de tu operación.
          </h1>
          <p class="mt-4 text-base leading-7 text-[#CBD5E1]">
            Cuéntanos qué necesitas resolver y te contactaremos para entender el contexto
            sin pedirte todos los datos operativos desde el primer paso.
          </p>
        </aside>

        <section class="rounded border border-[#1E293B] bg-[#111827] p-5 shadow-2xl shadow-black/30 sm:p-6">
          <form id="applicationForm" novalidate class="space-y-5">
            <fieldset class="grid gap-4 sm:grid-cols-2">
              <legend class="mb-3 text-lg font-bold text-white">Empresa y contacto</legend>
              <div class="sm:col-span-2">
                <label for="companyName" class="block text-sm font-medium text-[#CBD5E1]">Nombre de la empresa *</label>
                <input id="companyName" name="companyName" type="text" required minlength="2" class="mt-1.5 w-full rounded border border-[#1E293B] bg-[#0F172A] px-4 py-2.5 text-white outline-none transition focus:border-[#10B981]" />
                <p class="mt-1 min-h-4 text-xs text-[#FB7185]" data-error-for="companyName" aria-live="polite"></p>
              </div>
              <div>
                <label for="contactName" class="block text-sm font-medium text-[#CBD5E1]">Persona responsable *</label>
                <input id="contactName" name="contactName" type="text" required minlength="2" class="mt-1.5 w-full rounded border border-[#1E293B] bg-[#0F172A] px-4 py-2.5 text-white outline-none transition focus:border-[#10B981]" />
                <p class="mt-1 min-h-4 text-xs text-[#FB7185]" data-error-for="contactName" aria-live="polite"></p>
              </div>
              <div>
                <label for="email" class="block text-sm font-medium text-[#CBD5E1]">Email corporativo *</label>
                <input id="email" name="email" type="email" required class="mt-1.5 w-full rounded border border-[#1E293B] bg-[#0F172A] px-4 py-2.5 text-white outline-none transition focus:border-[#10B981]" />
                <p class="mt-1 min-h-4 text-xs text-[#FB7185]" data-error-for="email" aria-live="polite"></p>
              </div>
              <div class="sm:col-span-2">
                <label for="notes" class="block text-sm font-medium text-[#CBD5E1]">¿Qué necesitas resolver? *</label>
                <textarea id="notes" name="notes" required minlength="10" rows="4" placeholder="Ej: queremos mejorar entregas, gestionar devoluciones o externalizar preparación de pedidos." class="mt-1.5 w-full rounded border border-[#1E293B] bg-[#0F172A] px-4 py-2.5 text-white outline-none transition focus:border-[#10B981]"></textarea>
                <p class="mt-1 min-h-4 text-xs text-[#FB7185]" data-error-for="notes" aria-live="polite"></p>
              </div>
              <div class="rounded border border-[#1E293B] bg-[#0F172A] p-3 sm:col-span-2">
                <label class="flex gap-3 text-sm text-[#CBD5E1]">
                  <input id="consent" name="consent" type="checkbox" required class="mt-1 h-4 w-4 rounded border-[#1E293B] bg-[#0F172A] text-[#10B981] focus:ring-[#10B981]" />
                  <span>Acepto que TrackFlow use estos datos para responder mi consulta. *</span>
                </label>
                <p class="mt-1 min-h-4 text-xs text-[#FB7185]" data-error-for="consent" aria-live="polite"></p>
              </div>
            </fieldset>

            <div id="formStatus" class="hidden rounded border p-4 text-sm" role="status" aria-live="polite"></div>

            <div class="flex flex-col gap-3 sm:flex-row">
              <button type="submit" class="rounded bg-[#10B981] px-6 py-3 text-sm font-bold text-[#0F172A] transition hover:bg-[#34D399] focus:outline-none focus:ring-2 focus:ring-[#10B981] focus:ring-offset-2 focus:ring-offset-[#111827]">
                Enviar consulta
              </button>
            </div>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
